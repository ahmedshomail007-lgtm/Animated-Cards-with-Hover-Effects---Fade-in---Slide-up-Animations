<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE | Digital Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #080808; color: #f4f4f5; }
        .osmo-card {
            background: #111111;
            border: 1px solid #1f1f1f;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .osmo-card:hover {
            border-color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 40px -10px rgba(255,255,255,0.05);
        }
        .nav-blur {
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(12px);
        }
        .btn-pulse {
            background: #ffffff;
            color: #000000;
            transition: all 0.3s ease;
        }
        .btn-pulse:hover {
            background: #e4e4e7;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation -->
    <nav class="py-5 px-8 md:px-16 flex justify-between items-center nav-blur sticky top-0 z-50 border-b border-white/5">
        <div class="text-2xl font-extrabold tracking-tighter text-white">PULSE<span class="text-zinc-600">.</span></div>
        <div class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] text-zinc-500">
            <a href="#" class="hover:text-white transition">Agency</a>
            <a href="#" class="text-white border-b border-white pb-1">Services</a>
            <a href="#" class="hover:text-white transition">Portfolio</a>
            <a href="#" class="hover:text-white transition">Contact</a>
        </div>
    </nav>

    <!-- Hero Header -->
    <header class="py-32 px-6 max-w-4xl mx-auto text-center">
        <h1 class="text-7xl md:text-8xl font-extrabold tracking-tighter mb-8 leading-none" data-aos="fade-up">
            Digital craftsmanship.
        </h1>
        <p class="text-zinc-500 text-lg md:text-xl font-medium leading-relaxed" data-aos="fade-up" data-aos-delay="150">
            We build high-performance interfaces and scalable digital products for forward-thinking brands.
        </p>
    </header>

    <!-- Services Grid -->
    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Loading State -->
            <div class="col-span-full text-center text-zinc-700 font-bold uppercase tracking-widest animate-pulse">Syncing Services...</div>
        </div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay" class="fixed inset-0 hidden items-center justify-center z-[60] p-6 bg-black/95 backdrop-blur-md transition-all">
        <div class="bg-[#111] border border-white/10 rounded-[2rem] max-w-2xl w-full p-10 md:p-14 relative" id="modal-container">
            <button onclick="closeModal()" class="absolute top-8 right-10 text-zinc-500 hover:text-white text-4xl">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        async function fetchServices() {
            try {
                const res = await fetch('http://localhost:5000/services');
                const data = await res.json();
                const grid = document.getElementById('services-grid');
                grid.innerHTML = data.map((s, i) => `
                    <div class="osmo-card p-10 rounded-[2rem] flex flex-col justify-between" data-aos="fade-up" data-aos-delay="${i * 100}">
                        <div>
                            <div class="text-zinc-600 mb-8 font-bold text-xs uppercase tracking-widest">${s.category}</div>
                            <h2 class="text-3xl font-extrabold mb-5 tracking-tight text-white">${s.title}</h2>
                            <p class="text-zinc-500 leading-relaxed text-sm mb-12">${s.description}</p>
                        </div>
                        <button onclick='openModal(${JSON.stringify(s)})' class="text-[10px] uppercase tracking-[0.3em] font-black text-white hover:opacity-60 transition-opacity">
                            View Project Specs +
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-400">Connection Error. Is the PULSE server running?</p>`;
            }
        }

        function openModal(s) {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-body').innerHTML = `
                <div class="mb-10">
                    <span class="text-zinc-500 font-bold uppercase tracking-[0.2em] text-[10px]">${s.category}</span>
                    <h2 class="text-5xl font-extrabold mt-4 tracking-tighter text-white">${s.title}</h2>
                </div>
                <p class="text-zinc-400 text-lg leading-relaxed mb-12">${s.details}</p>
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-8 border-t border-white/5 pt-10">
                    <div>
                        <span class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Base Investment</span>
                        <p class="text-4xl font-extrabold text-white mt-1">${s.price}</p>
                    </div>
                    <button class="btn-pulse px-10 py-5 rounded-full font-black uppercase text-[11px] tracking-widest">
                        Book Consultation
                    </button>
                </div>
            `;
            overlay.classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
        }

        fetchServices();
    </script>
</body>
</html>
